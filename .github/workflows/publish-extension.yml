name: Publish Extension

on:
  push:
    tags:
      - "ext-v*.*.*"
  workflow_dispatch:
    inputs:
      extension_tag:
        description: "Extension tag (e.g. ext-v1.0.0)"
        required: true
      cli_tag:
        description: "CLI release tag to bundle (e.g. v1.0.0)"
        required: true
      publish_marketplace:
        description: "Publish VSIX files to the VS Marketplace"
        type: boolean
        default: false

permissions:
  contents: read

env:
  EXTENSION_DIR: Extension/rbx-fileview

jobs:
  package:
    name: Package (${{ matrix.vsce-target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - vsce-target: win32-x64
            cli-artifact: rbx-fileview-windows-x86_64
            cli-binary: rbx-fileview.exe
            packaged-binary: rbx-fileview.exe

          - vsce-target: linux-x64
            cli-artifact: rbx-fileview-linux-x86_64
            cli-binary: rbx-fileview
            packaged-binary: rbx-fileview

          - vsce-target: linux-arm64
            cli-artifact: rbx-fileview-linux-aarch64
            cli-binary: rbx-fileview
            packaged-binary: rbx-fileview

          - vsce-target: darwin-x64
            cli-artifact: rbx-fileview-macos-x86_64
            cli-binary: rbx-fileview
            packaged-binary: rbx-fileview

          - vsce-target: darwin-arm64
            cli-artifact: rbx-fileview-macos-aarch64
            cli-binary: rbx-fileview
            packaged-binary: rbx-fileview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tags
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            EXT_TAG="${{ github.event.inputs.extension_tag }}"
            CLI_TAG="${{ github.event.inputs.cli_tag }}"
          else
            EXT_TAG="${{ github.ref_name }}"
            CLI_TAG="${EXT_TAG#ext-}"
          fi

          VERSION="${EXT_TAG#ext-v}"
          echo "extension_tag=${EXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "cli_tag=${CLI_TAG}" >> "$GITHUB_OUTPUT"
          echo "package_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync extension version
        working-directory: ${{ env.EXTENSION_DIR }}
        run: |
          node -e "const fs=require('fs'); const file='package.json'; const pkg=JSON.parse(fs.readFileSync(file,'utf8')); pkg.version='${{ steps.version.outputs.package_version }}'; fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Download CLI asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.version.outputs.cli_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ matrix.cli-artifact }}.zip" \
            --dir /tmp/cli-asset

      - name: Stage bundled CLI
        run: |
          mkdir -p "${{ env.EXTENSION_DIR }}/bin/${{ matrix.vsce-target }}"
          unzip -j /tmp/cli-asset/${{ matrix.cli-artifact }}.zip -d /tmp/cli-bin
          install -m 755 "/tmp/cli-bin/${{ matrix.cli-binary }}" \
            "${{ env.EXTENSION_DIR }}/bin/${{ matrix.vsce-target }}/${{ matrix.packaged-binary }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ${{ env.EXTENSION_DIR }}/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.EXTENSION_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ env.EXTENSION_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Compile extension
        working-directory: ${{ env.EXTENSION_DIR }}
        run: pnpm run compile

      - name: Package VSIX
        working-directory: ${{ env.EXTENSION_DIR }}
        run: |
          pnpm exec vsce package \
            --no-dependencies \
            --target ${{ matrix.vsce-target }} \
            -o "rbx-fileview-${{ matrix.vsce-target }}.vsix"

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vsce-target }}
          path: ${{ env.EXTENSION_DIR }}/rbx-fileview-${{ matrix.vsce-target }}.vsix

  publish:
    name: Publish to Marketplace
    needs: package
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_marketplace == 'true' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        vsce-target:
          - win32-x64
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix-${{ matrix.vsce-target }}
          path: vsix

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ${{ env.EXTENSION_DIR }}/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.EXTENSION_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ env.EXTENSION_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Publish VSIX
        working-directory: ${{ env.EXTENSION_DIR }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          pnpm exec vsce publish "$GITHUB_WORKSPACE/vsix/rbx-fileview-${{ matrix.vsce-target }}.vsix" \
            --pat "$VSCE_PAT" \
            --target "${{ matrix.vsce-target }}"
