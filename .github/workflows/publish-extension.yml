name: Publish Extension

on:
  push:
    tags:
      - "ext-v*.*.*"
  workflow_dispatch:
    inputs:
      extension_tag:
        description: "Extension tag (e.g. ext-v1.0.0)"
        required: true
      publish_marketplace:
        description: "Publish VSIX to the VS Marketplace"
        type: boolean
        default: false

permissions:
  contents: read

env:
  EXTENSION_DIR: Extension/rbx-fileview

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            EXT_TAG="${{ github.event.inputs.extension_tag }}"
          else
            EXT_TAG="${{ github.ref_name }}"
          fi

          VERSION="${EXT_TAG#ext-v}"
          echo "extension_tag=${EXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "package_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync extension version
        working-directory: ${{ env.EXTENSION_DIR }}
        run: |
          node -e "const fs=require('fs'); const file='package.json'; const pkg=JSON.parse(fs.readFileSync(file,'utf8')); pkg.version='${{ steps.version.outputs.package_version }}'; fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ${{ env.EXTENSION_DIR }}/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.EXTENSION_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ env.EXTENSION_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Compile extension
        working-directory: ${{ env.EXTENSION_DIR }}
        run: pnpm run compile

      - name: Package VSIX
        working-directory: ${{ env.EXTENSION_DIR }}
        run: pnpm exec vsce package --no-dependencies -o rbx-fileview.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: ${{ env.EXTENSION_DIR }}/rbx-fileview.vsix

  publish:
    name: Publish to Marketplace
    needs: package
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_marketplace == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: vsix

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ${{ env.EXTENSION_DIR }}/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.EXTENSION_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ env.EXTENSION_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Publish VSIX
        working-directory: ${{ env.EXTENSION_DIR }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          pnpm exec vsce publish "$GITHUB_WORKSPACE/vsix/rbx-fileview.vsix" \
            --pat "$VSCE_PAT"
